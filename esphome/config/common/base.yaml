time:
  - platform: homeassistant
    id: homeassistant_time

uart:
  - id: iu_uart
    baud_rate: 2400
    parity: EVEN
    rx_pin: GPIO21
    tx_pin: GPIO20
  - id: wr_uart
    baud_rate: 2400
    parity: EVEN
    rx_pin: GPIO18
    tx_pin: GPIO19

climate:
  - platform: mitsubishi_itp
    id: heat_pump
    name: "Thermostat"
    icon: mdi:heat-pump
    uart_heatpump: iu_uart
    uart_thermostat: wr_uart
    supported_modes:
      - 'OFF'
      - HEAT
      - COOL
      - FAN_ONLY
      - DRY
    supported_fan_modes:
      - AUTO
      - QUIET
      - LOW
      - MEDIUM
      - HIGH
    custom_fan_modes:
      - VERYHIGH
    # enhanced_mhk: True
    visual:
      temperature_step:
        target_temperature: 1.0
        current_temperature: 1.0
    update_interval: 10s
    on_state:
      - lambda: |-
          float target_temperature = id(heat_pump).target_temperature;
          for (int i = 0; i < sizeof(id(m_ctof_c))/sizeof(id(m_ctof_c)[0]); i++) {
            if (id(m_ctof_c)[i] == target_temperature) {
              ESP_LOGD("on_state", "target_temperature=%f", target_temperature);
              id(heat_pump).target_temperature = (id(m_ctof_f)[i] - 32.0) * 5.0 / 9.0;
              ESP_LOGD("on_state", "target_temperature=%f", id(heat_pump).target_temperature);
            }
          }
          float current_temperature = id(heat_pump).current_temperature;
          for (int i = 0; i < sizeof(id(m_ctof_c))/sizeof(id(m_ctof_c)[0]); i++) {
            if (id(m_ctof_c)[i] == current_temperature) {
              ESP_LOGD("on_state", "current_temperature=%f", current_temperature);
              ESP_LOGD("on_state", "current_temperature=%f", id(heat_pump).current_temperature);
            }
          }
    on_control:
      - lambda: |-
          float target_temperature_c = id(heat_pump).target_temperature;
          float target_temperature_f = round(target_temperature_c * 9.0 / 5.0 + 32.0);
          for (int i = 0; i < sizeof(id(m_ctof_f))/sizeof(id(m_ctof_f)[0]); i++) {
            if (id(m_ctof_f)[i] == target_temperature_f) {
              ESP_LOGD("on_control", "target_temperature=%f", target_temperature_c);
              id(heat_pump).target_temperature = (id(m_ctof_f)[i] - 32.0) * 5.0 / 9.0;
              ESP_LOGD("on_control", "target_temperature=%f", id(heat_pump).target_temperature);
            }
          }

select:
  - platform: mitsubishi_itp
    temperature_source:
      name: "Temperature Source"
      id: temperature_source_select
      sources: []
    vane_position:
      name: "Vane Position"
    horizontal_vane_position:
      name: "H. Vane Position"

text_sensor:
  - platform: mitsubishi_itp
    actual_fan:
      name: "Actual Fan"
    error_code:
      name: "Error Code"

# Default logging level
logger:
  baud_rate: 0
  level: DEBUG
  logs:
    EVT_SETS : DEBUG
    WIFI : INFO
    MQTT : INFO
    WRITE_SETTINGS : DEBUG
    SETTINGS : DEBUG
    STATUS : INFO
    CN105Climate: WARN
    CN105: DEBUG
    climate: WARN
    sensor: WARN
    chkSum : INFO
    WRITE : WARN
    READ : WARN
    Header: INFO
    Decoder : DEBUG
    CONTROL_WANTED_SETTINGS: DEBUG
