esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.3

  on_boot:
    priority: 260
    then:
      - select.set:
          id: temperature_source_select
          option: "Thermostat"

esp32:
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: esp-idf

external_components:
  - source: github://muart-group/esphome-components@dev
    components: [ mitsubishi_itp ]

ota:
